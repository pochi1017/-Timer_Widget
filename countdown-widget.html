<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: transparent;
    font-family: 'Inter', sans-serif;
  }

  .wrap {
    text-align: center;
    padding: 24px 20px;
    max-width: 480px;
    width: 100%;
  }

  /* 1단: 메인 카피 */
  .headline {
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.5;
    margin-bottom: 10px;
  }

  /* 2단: 경고 문구 */
  .warning {
    display: inline-block;
    font-size: clamp(11px, 2.8vw, 14px);
    font-weight: 600;
    color: #fff;
    background: #E53030;
    padding: 4px 14px;
    border-radius: 4px;
    margin-bottom: 20px;
  }

  /* 3단: 라벨 */
  .label {
    font-size: clamp(10px, 2.5vw, 12px);
    font-weight: 500;
    color: #999;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  /* 4단: 카운트다운 */
  .timer {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: clamp(4px, 1.5vw, 10px);
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .num {
    font-size: clamp(28px, 8vw, 40px);
    font-weight: 800;
    color: #E00;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    min-width: clamp(40px, 10vw, 60px);
    text-align: center;
  }

  .unit-label {
    font-size: clamp(9px, 2vw, 11px);
    font-weight: 600;
    color: #C44;
    letter-spacing: 1px;
  }

  .sep {
    font-size: clamp(20px, 5vw, 30px);
    font-weight: 700;
    color: #E00;
    opacity: 0.4;
    padding-top: clamp(2px, 0.5vw, 6px);
  }

  .ms {
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 700;
    color: #E00;
    opacity: 0.6;
    padding-top: clamp(6px, 1.5vw, 12px);
    min-width: clamp(24px, 6vw, 36px);
    font-variant-numeric: tabular-nums;
  }

  /* 종료 */
  .ended {
    font-size: clamp(18px, 5vw, 28px);
    font-weight: 800;
    color: #E00;
    padding: 20px 0;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>

<div class="wrap" id="wrap">
  <div class="headline">2주간 한정 판매, 이 가격은 지금뿐입니다.</div>
  <div class="warning">04월 06일 이후 구매 불가능</div>
  <div class="label">마감까지 남은 시간</div>
  <div class="timer" id="timer">
    <div class="unit">
      <div class="num" id="d">00</div>
      <div class="unit-label">일</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="num" id="h">00</div>
      <div class="unit-label">시간</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="num" id="m">00</div>
      <div class="unit-label">분</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="num" id="s">00</div>
      <div class="unit-label">초</div>
    </div>
    <div class="ms" id="ms">.00</div>
  </div>
</div>

<script>
  const TARGET = new Date('2026-04-07T00:00:00+09:00').getTime();

  const $d = document.getElementById('d');
  const $h = document.getElementById('h');
  const $m = document.getElementById('m');
  const $s = document.getElementById('s');
  const $ms = document.getElementById('ms');
  const $wrap = document.getElementById('wrap');

  function pad(n) { return n.toString().padStart(2, '0'); }

  function tick() {
    const diff = TARGET - Date.now();

    if (diff <= 0) {
      document.getElementById('timer').style.display = 'none';
      document.querySelector('.label').style.display = 'none';
      const el = document.createElement('div');
      el.className = 'ended';
      el.textContent = '마감되었습니다';
      $wrap.appendChild(el);
      return;
    }

    $d.textContent = pad(Math.floor(diff / 86400000));
    $h.textContent = pad(Math.floor((diff % 86400000) / 3600000));
    $m.textContent = pad(Math.floor((diff % 3600000) / 60000));
    $s.textContent = pad(Math.floor((diff % 60000) / 1000));
    $ms.textContent = '.' + pad(Math.floor((diff % 1000) / 10));

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
</script>

</body>
</html>
