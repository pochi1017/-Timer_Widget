<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Carrot Clock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  :root { color-scheme: light dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent !important; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: transparent;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }
  .widget {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 32px 32px 28px;
    border-radius: 24px;
    min-width: 225px;
    white-space: nowrap;
    background: #F5EDE9;
    box-shadow: none;
  }
  .carrot-img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    animation: bounce 3s ease-in-out infinite;
    filter: drop-shadow(0 2px 6px rgba(243, 166, 89, 0.3));
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    30% { transform: translateY(-6px) rotate(3deg); }
    60% { transform: translateY(-2px) rotate(-2deg); }
  }
  .greeting {
    font-size: 14px;
    font-weight: 700;
    color: #D4854A;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .time-container {
    display: flex;
    align-items: baseline;
    gap: 3px;
  }
  .time {
    font-size: 44px;
    font-weight: 800;
    color: #5C4033;
    letter-spacing: -1px;
    line-height: 1;
  }
  .seconds {
    font-size: 20px;
    font-weight: 700;
    color: #D4854A;
    min-width: 28px;
  }
  .ampm {
    font-size: 15px;
    font-weight: 700;
    color: #8FB07A;
    margin-left: 4px;
  }
  .colon { animation: blink 1s step-end infinite; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .date-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }
  .date {
    font-size: 13px;
    font-weight: 600;
    color: #A08060;
    letter-spacing: 0.3px;
  }
  .day-badge {
    font-size: 11px;
    font-weight: 700;
    color: #FFFFFF;
    background: linear-gradient(135deg, #F3A659, #D4854A);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .progress-wrap {
    width: 100%;
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .progress-label {
    font-size: 10px;
    font-weight: 600;
    color: #C4A882;
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: #E8DDD6;
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #F3C896, #F3A659, #8FB07A);
    background-size: 200% 100%;
    animation: shimmer 3s ease-in-out infinite;
    transition: width 1s ease;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
</style>
</head>

  <div class="greeting" id="greetText">좋은 하루 되세요!</div>
  <div class="time-container">
    <span class="time" id="clock">00<span class="colon">:</span>00</span>
    <span class="seconds" id="sec">00</span>
    <span class="ampm" id="ampm">AM</span>
  </div>
  <div class="date-row">
    <span class="date" id="date">2026년 4월 27일</span>
    <span class="day-badge" id="day">월요일</span>
  </div>
  <div class="progress-wrap">
    <span class="progress-label" id="progressLabel">오늘 0% 지남</span>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>
</div>
<script>
  const days = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  function getGreeting(h) {
    if (h < 6) return '🌙 좋은 꿈 꾸세요';
    if (h < 9) return '🥕 좋은 아침이에요!';
    if (h < 12) return '🥕 좋은 하루 되세요!';
    if (h < 14) return '🍽️ 점심 맛있게 드세요!';
    if (h < 17) return '🥕 오후도 힘내요!';
    if (h < 19) return '🌇 수고 많았어요!';
    if (h < 22) return '🥕 편안한 저녁 보내세요';
    return '🌙 오늘도 수고했어요!';
  }
  function pad(n) { return n < 10 ? '0' + n : n; }
  function update() {
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    document.getElementById('clock').innerHTML = pad(h12) + '<span class="colon">:</span>' + pad(m);
    document.getElementById('sec').textContent = pad(s);
    document.getElementById('ampm').textContent = ampm;
    const y = now.getFullYear();
    const mo = now.getMonth() + 1;
    const d = now.getDate();
    document.getElementById('date').textContent = y + '년 ' + mo + '월 ' + d + '일';
    document.getElementById('day').textContent = days[now.getDay()];
    document.getElementById('greetText').textContent = getGreeting(h);
    const totalMinutes = h * 60 + m;
    const pct = Math.round((totalMinutes / 1440) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = '오늘 ' + pct + '% 지남';
  }
  update();
  setInterval(update, 1000);
</script>
