<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #F9F9FB;
    font-family: 'Inter', sans-serif;
  }

  .wrap {
    text-align: center;
    padding: 40px 32px;
    max-width: 1080px;
    width: 100%;
  }

  .headline {
    font-size: 32px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.4;
    margin-bottom: 16px;
  }

  .warning {
    display: inline-block;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    background: #E53030;
    padding: 8px 24px;
    border-radius: 6px;
    margin-bottom: 32px;
  }

  .label {
    font-size: 16px;
    font-weight: 500;
    color: #999;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }

  .timer {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 16px;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .num {
    font-size: 72px;
    font-weight: 800;
    color: #E00;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    min-width: 100px;
    text-align: center;
  }

  .unit-label {
    font-size: 14px;
    font-weight: 600;
    color: #C44;
    letter-spacing: 2px;
  }

  .sep {
    font-size: 52px;
    font-weight: 700;
    color: #E00;
    opacity: 0.4;
    padding-top: 6px;
  }

  .ms {
    font-size: 36px;
    font-weight: 700;
    color: #E00;
    opacity: 0.6;
    padding-top: 20px;
    min-width: 56px;
    font-variant-numeric: tabular-nums;
  }

  .ended {
    font-size: 48px;
    font-weight: 800;
    color: #E00;
    padding: 24px 0;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* 모바일 대응 */
  @media (max-width: 600px) {
    .wrap { padding: 24px 16px; }
    .headline { font-size: 20px; }
    .warning { font-size: 14px; padding: 6px 16px; }
    .label { font-size: 12px; }
    .num { font-size: 40px; min-width: 52px; }
    .sep { font-size: 28px; }
    .ms { font-size: 22px; padding-top: 10px; }
    .unit-label { font-size: 10px; }
    .timer { gap: 8px; }
    .ended { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="wrap" id="wrap">
  <div class="headline">2주간 한정 판매, 이 가격은 지금뿐입니다.</div>
  <div class="warning">04월 06일 이후 구매 불가능</div>
  <div class="label">마감까지 남은 시간</div>
  <div class="timer" id="timer">
    <div class="unit">
      <div class="num" id="d">00</div>
      <div class="unit-label">일</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="num" id="h">00</div>
      <div class="unit-label">시간</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="num" id="m">00</div>
      <div class="unit-label">분</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="num" id="s">00</div>
      <div class="unit-label">초</div>
    </div>
    <div class="ms" id="ms">.00</div>
  </div>
</div>

<script>
  const TARGET = new Date('2026-04-07T00:00:00+09:00').getTime();

  const $d = document.getElementById('d');
  const $h = document.getElementById('h');
  const $m = document.getElementById('m');
  const $s = document.getElementById('s');
  const $ms = document.getElementById('ms');
  const $wrap = document.getElementById('wrap');

  function pad(n) { return n.toString().padStart(2, '0'); }

  let ended = false;

  function tick() {
    if (ended) return;
    const diff = TARGET - Date.now();

    if (diff <= 0) {
      ended = true;
      document.getElementById('timer').style.display = 'none';
      document.querySelector('.label').style.display = 'none';
      const el = document.createElement('div');
      el.className = 'ended';
      el.textContent = '마감되었습니다';
      $wrap.appendChild(el);
      return;
    }

    $d.textContent = pad(Math.floor(diff / 86400000));
    $h.textContent = pad(Math.floor((diff % 86400000) / 3600000));
    $m.textContent = pad(Math.floor((diff % 3600000) / 60000));
    $s.textContent = pad(Math.floor((diff % 60000) / 1000));
    $ms.textContent = '.' + pad(Math.floor((diff % 1000) / 10));

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
</script>

</body>
</html>
